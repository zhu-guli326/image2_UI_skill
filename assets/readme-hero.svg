<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Image to UI Skill</title>
  <desc id="desc">A clear project banner for the Image to UI Skill, showing a workflow from UI references to frontend code and generated image assets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="0.48" stop-color="#14212A"/>
      <stop offset="1" stop-color="#0F151C"/>
    </linearGradient>
    <linearGradient id="accent" x1="160" y1="60" x2="1020" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5FA2"/>
      <stop offset="0.5" stop-color="#8BE9FD"/>
      <stop offset="1" stop-color="#FFE66D"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect x="28" y="28" width="1144" height="364" rx="28" stroke="url(#accent)" stroke-width="2"/>
  <path d="M64 316C166 246 236 257 322 292C423 333 492 333 604 255C711 181 788 135 905 181C1005 220 1054 199 1134 124" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.38"/>
  <path d="M88 88H234M966 332H1112M86 332H174M1014 88H1112" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="2" stroke-linecap="round"/>

  <g filter="url(#softShadow)">
    <rect x="92" y="86" width="300" height="230" rx="22" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <rect x="122" y="118" width="150" height="14" rx="7" fill="#8BE9FD"/>
    <rect x="122" y="150" width="220" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.66"/>
    <rect x="122" y="176" width="188" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.38"/>
    <rect x="122" y="214" width="76" height="54" rx="12" fill="#FF5FA2" fill-opacity="0.78"/>
    <rect x="214" y="214" width="76" height="54" rx="12" fill="#FFE66D" fill-opacity="0.78"/>
