    <rect x="1020" y="116" width="66" height="98" rx="10" fill="#FFFFFF" fill-opacity="0.1"/>
    <rect x="1032" y="128" width="42" height="8" rx="4" fill="#8BE9FD"/>
    <rect x="1032" y="148" width="32" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.42"/>
    <rect x="1032" y="170" width="42" height="28" rx="8" fill="#FF5FA2" fill-opacity="0.78"/>
    <circle cx="1053" cy="228" r="5" fill="#FFFFFF" fill-opacity="0.45"/>
